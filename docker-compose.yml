version: '3.8'

services:
  app:
    build: .
    container_name: caijing18_app
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}
    depends_on:
      - telegram_bot
    command: python main.py

  telegram_bot:
    build: .
    container_name: caijing18_bot
    volumes:
      - ./data:/app/data
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}
    command: python telegram_bot.py
