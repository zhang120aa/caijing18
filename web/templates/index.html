<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财经速报 - Financial Express Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 12px;
            opacity: 0.9;
        }

        .controls {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
        }

        .filter-section {
            margin-bottom: 20px;
        }

        .filter-section label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .tag-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tag-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .news-container {
            display: grid;
            gap: 15px;
        }

        .news-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .news-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .news-content {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .news-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #f0f0f0;
            padding-top: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 16px;
        }

        .empty {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            color: #666;
        }

        .pagination {
            text-align: center;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .pagination button {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            color: #333;
            transition: all 0.3s;
        }

        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            margin-top: 10px;
        }

        .modal-body {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .modal-meta {
            font-size: 12px;
            color: #999;
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .search-box {
                flex-direction: column;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📰 财经速报</h1>
            <p>实时聚合 Financial Express 频道，智能去重和分类</p>
        </div>

        <!-- 统计信息 -->
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="number" id="total-count">-</div>
                <div class="label">总新闻数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="today-count">-</div>
                <div class="label">今日新闻</div>
            </div>
            <div class="stat-card">
                <div class="number" id="retention">7</div>
                <div class="label">保留天数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="threshold">75%</div>
                <div class="label">去重阈值</div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="controls">
            <!-- 搜索框 -->
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索标题、内容或关键词...">
                <button onclick="search()">🔍 搜索</button>
                <button onclick="reset()" style="background: #999;">↺ 重置</button>
            </div>

            <!-- 标签筛选 -->
            <div class="filter-section">
                <label>按标签筛选</label>
                <div class="tags-container" id="tags-container">
                
                </div>
            </div>

            <!-- 日期筛选 -->
            <div class="filter-section">
                <label>按日期筛选</label>
                <div style="display: flex; gap: 10px;">
                    <input type="date" id="start-date" placeholder="开始日期">
                    <input type="date" id="end-date" placeholder="结束日期">
                    <button onclick="filterByDate()" style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer;">筛选</button>
                </div>
            </div>
        </div>

        <!-- 新闻列表 -->
        <div class="news-container" id="news-container">
            <div class="loading">加载中...</div>
        </div>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 详情模态框 -->
    <div class="modal" id="detail-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-title" id="modal-title"></div>
            <div class="news-tags" id="modal-tags"></div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-meta" id="modal-meta"></div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentPage = 1;
        let selectedTags = [];
        let currentMode = 'list'; // list, search, filter

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadTags();
            loadNews();
            
            // 回车搜索
            document.getElementById('search-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') search();
            });
        });

        // 加载统计信息
        function loadStats() {
            fetch('/api/stats')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        document.getElementById('total-count').textContent = data.stats.total;
                        document.getElementById('today-count').textContent = data.stats.today;
                        document.getElementById('retention').textContent = data.stats.retention_days;
                        document.getElementById('threshold').textContent = Math.round(data.stats.similarity_threshold * 100) + '%';
                    }
                })
                .catch(err => console.error('加载统计失败:', err));
        }

        // 加载标签
        function loadTags() {
            fetch('/api/tags')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const container = document.getElementById('tags-container');
                        container.innerHTML = '';
                        data.tags.forEach(tag => {
                            const btn = document.createElement('button');
                            btn.className = 'tag-btn';
                            btn.textContent = tag;
                            btn.onclick = () => toggleTag(tag, btn);
                            container.appendChild(btn);
                        });
                    }
                })
                .catch(err => console.error('加载标签失败:', err));
        }

        // 切换标签选择
        function toggleTag(tag, btn) {
            if (selectedTags.includes(tag)) {
                selectedTags = selectedTags.filter(t => t !== tag);
                btn.classList.remove('active');
            } else {
                selectedTags.push(tag);
                btn.classList.add('active');
            }
        }

        // 加载新闻列表
        function loadNews(page = 1) {
            currentPage = page;
            const url = `/api/news?page=${page}&limit=10`;
            
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderNews(data.data);
                        renderPagination(data.total, page);
                    }
                })
                .catch(err => {
                    console.error('加载新闻失败:', err);
                    document.getElementById('news-container').innerHTML = '<div class="empty">加载失败，请稍后重试</div>';
                });
        }

        // 搜索新闻
        function search() {
            const keyword = document.getElementById('search-input').value.trim();
            
            if (!keyword) {
                alert('请输入搜索关键词');
                return;
            }

            currentMode = 'search';
            selectedTags = [];
            updateTagButtons();

            fetch(`/api/search?keyword=${encodeURIComponent(keyword)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderNews(data.data);
                        document.getElementById('pagination').innerHTML = `<p style="color: white;">找到 ${data.total} 条相关新闻</p>`;
                    } else {
                        document.getElementById('news-container').innerHTML = '<div class="empty">' + data.message + '</div>';
                    }
                })
                .catch(err => console.error('搜索失败:', err));
        }

        // 按日期筛选
        function filterByDate() {
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;

            if (!startDate && !endDate) {
                alert('请选择日期范围');
                return;
            }

            currentMode = 'filter';
            let url = '/api/filter?';
            
            if (startDate) url += `start_date=${startDate}&`;
            if (endDate) url += `end_date=${endDate}&`;
            if (selectedTags.length > 0) {
                selectedTags.forEach(tag => url += `tags=${tag}&`);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderNews(data.data);
                        document.getElementById('pagination').innerHTML = `<p style="color: white;">找到 ${data.total} 条新闻</p>`;
                    }
                })
                .catch(err => console.error('筛选失败:', err));
        }

        // 按标签获取新闻
        function filterByTag(tag) {
            fetch(`/api/news/by-tag?tag=${encodeURIComponent(tag)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderNews(data.data);
                        document.getElementById('pagination').innerHTML = `<p style="color: white;">找到 ${data.total} 条 ${tag} 新闻</p>`;
                    }
                })
                .catch(err => console.error('加载失败:', err));
        }

        // 渲染新闻列表
        function renderNews(newsData) {
            const container = document.getElementById('news-container');
            
            if (!newsData || newsData.length === 0) {
                container.innerHTML = '<div class="empty">🔍 暂无新闻</div>';
                return;
            }

            container.innerHTML = newsData.map(news => `
                <div class="news-card" onclick="showDetail('${news.id}', '${escapeHtml(news.title)}', '${escapeHtml(news.full_content)}', ${JSON.stringify(news.tags)}, '${news.time}', '${news.source}')">
                    <div class="news-title">${news.title}</div>
                    <div class="news-content">${news.content}</div>
                    <div class="news-tags">
                        ${news.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div class="news-meta">
                        <span>📅 ${formatTime(news.time)}</span>
                        <span>📌 ${news.source}</span>
                    </div>
                </div>
            `).join('');
        }

        // 渲染分页
        function renderPagination(total, currentPage) {
            const container = document.getElementById('pagination');
            const totalPages = Math.ceil(total / 10);

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            
            if (currentPage > 1) {
                html += `<button onclick="loadNews(1)">« 首页</button>`;
                html += `<button onclick="loadNews(${currentPage - 1})">‹ 上一页</button>`;
            }

            for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
                if (i === currentPage) {
                    html += `<button style="background: #667eea; color: white;">${i}</button>`;
                } else {
                    html += `<button onclick="loadNews(${i})">${i}</button>`;
                }
            }

            if (currentPage < totalPages) {
                html += `<button onclick="loadNews(${currentPage + 1})">下一页 ›</button>`;
                html += `<button onclick="loadNews(${totalPages})">末页 »</button>`;
            }

            container.innerHTML = html;
        }

        // 显示详情
        function showDetail(id, title, content, tags, time, source) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').textContent = content;
            document.getElementById('modal-tags').innerHTML = tags
                .map(tag => `<span class="tag">${tag}</span>`)
                .join('');
            document.getElementById('modal-meta').innerHTML = `
                <div>📅 ${formatTime(time)}</div>
                <div>📌 来源: ${source}</div>
            `;
            document.getElementById('detail-modal').classList.add('show');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('detail-modal').classList.remove('show');
        }

        // 重置
        function reset() {
            currentPage = 1;
            currentMode = 'list';
            selectedTags = [];
            document.getElementById('search-input').value = '';
            document.getElementById('start-date').value = '';
            document.getElementById('end-date').value = '';
            updateTagButtons();
            loadNews();
        }

        // 更新标签按钮状态
        function updateTagButtons() {
            const btns = document.querySelectorAll('.tag-btn');
            btns.forEach(btn => {
                if (selectedTags.includes(btn.textContent)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // 格式化时间
        function formatTime(isoTime) {
            const date = new Date(isoTime);
            const now = new Date();
            const diff = now - date;

            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            if (days < 7) return `${days}天前`;

            return date.toLocaleDateString('zh-CN');
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 点击模态框外部关闭
        document.getElementById('detail-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
